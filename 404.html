<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found | Vitor Schiavo</title>
    <meta name="robots" content="noindex">
    <style>
        :root {
            --primary:       #3b82f6;
            --primary-glow:  rgba(59, 130, 246, 0.15);
            --bg-base:       #0a0f1e;
            --bg-surface:    #0f172a;
            --bg-elevated:   #1e293b;
            --text-primary:  #f1f5f9;
            --text-secondary:#94a3b8;
            --text-muted:    #64748b;
            --border:        rgba(255,255,255,0.07);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg-base);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .container {
            text-align: center;
            max-width: 480px;
        }

        .code {
            font-size: clamp(6rem, 20vw, 9rem);
            font-weight: 800;
            line-height: 1;
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -4px;
            margin-bottom: 1.5rem;
        }

        .title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
        }

        .desc {
            color: var(--text-secondary);
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 2.5rem;
        }

        .path {
            display: inline-block;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 0.375rem;
            padding: 0.25rem 0.75rem;
            font-family: 'SFMono-Regular', Consolas, monospace;
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-bottom: 2.5rem;
            word-break: break-all;
        }

        .actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.625rem 1.25rem;
            border-radius: 0.5rem;
            font-size: 0.9375rem;
            font-weight: 500;
            text-decoration: none;
            transition: opacity 0.15s, transform 0.15s;
            cursor: pointer;
        }

        .btn:hover { opacity: 0.85; transform: translateY(-1px); }
        .btn:active { transform: translateY(0); }

        .btn-primary {
            background: #3b82f6;
            color: #fff;
        }

        .btn-secondary {
            background: var(--bg-elevated);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        @media (prefers-reduced-motion: reduce) {
            .btn { transition: none; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="code" aria-label="Error 404">404</div>
        <h1 class="title">Page not found</h1>
        <p class="desc">This URL doesn't exist or may have been moved.</p>
        <div class="path" id="current-path" aria-live="polite"></div>
        <div class="actions">
            <a href="/portfolio/" class="btn btn-primary">Go home</a>
            <button onclick="history.back()" class="btn btn-secondary">Go back</button>
        </div>
    </div>
    <script>
        const el = document.getElementById('current-path');
        if (el) el.textContent = location.pathname;
    </script>
</body>
</html>
